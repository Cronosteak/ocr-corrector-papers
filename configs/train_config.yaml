# Configuración de entrenamiento del modelo

# Modelo base
model_name: "google/flan-t5-base"
# Alternativas: "google/flan-t5-small", "facebook/bart-base"

# Tokenización
max_input_length: 256
max_output_length: 128
prefix: "correct OCR: "

# Entrenamiento
batch_size: 8
gradient_accumulation_steps: 2
learning_rate: 1.0e-4
num_epochs: 50
warmup_steps: 0
weight_decay: 0.0
max_grad_norm: 1.0
optim: adafactor
fp16: false
seed: 42

# Data splits
train_split: 0.8
val_split: 0.1
test_split: 0.1

# Guardado del modelo
output_dir: "models/ocr-corrector"
save_strategy: "epoch"
evaluation_strategy: "epoch"
load_best_model_at_end: true
metric_for_best_model: "eval_loss"

# Hardware
fp16: false  # Cambiar a true si tienes GPU con soporte FP16
dataloader_num_workers: 2
