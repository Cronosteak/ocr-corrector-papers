# Configuración de consulta a OpenAlex API
# Docs: https://docs.openalex.org/

# Filtros de búsqueda
filters:
  # Conceptos: Ingeniería Eléctrica + áreas relacionadas con buena cobertura OA
  # C39432304 = Electrical Engineering
  # C41008148 = Computer Science
  # C127413603 = Engineering
  # C185592680 = Chemistry
  concept_id: "C39432304"
  extra_concept_ids:
    - "C41008148"   # Computer Science
    - "C127413603"  # Engineering

  # Solo papers con acceso abierto (necesitamos el PDF)
  is_oa: true
  
  # Rango de años de publicación
  from_publication_date: "2018-01-01"
  to_publication_date: "2026-03-31"
  
  # Idioma — filtrar por inglés
  language: "en"

# Paginación
per_page: 50
max_results: 1500  # Aumentado para obtener más papers

# Campos a recuperar de cada trabajo
select_fields:
  - id
  - doi
  - title
  - abstract_inverted_index
  - open_access
  - publication_date
  - language
  - primary_location
